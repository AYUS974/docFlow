# Render Blueprint — ALL-FREE setup (two free web services).
#
# Trade-offs of the free tier (accepted on purpose):
#   - services sleep after ~15 min idle -> ~50s cold start on next request
#   - NO persistent disk -> uploaded documents are lost on restart/sleep
#   - 512 MB RAM each -> basic PDF ops work; LibreOffice/OCR may OOM
#
# To deploy: Render Dashboard -> New -> Blueprint -> connect this repo.
services:
  # ---- Next.js web app (public) -------------------------------------------
  - type: web
    name: docflow-web
    runtime: docker
    dockerfilePath: ./Dockerfile.web
    dockerContext: .
    region: singapore
    plan: free
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      # Force Next's standalone server to bind 0.0.0.0 (else Docker's auto-set
      # HOSTNAME makes it unreachable -> 502).
      - key: HOSTNAME
        value: "0.0.0.0"
      # pdf-svc is a separate free web service -> reach it over its public URL.
      # IMPORTANT: if Render gives pdf-svc a different URL (name collision),
      # update this value in the dashboard after the first deploy.
      - key: PDF_SVC_URL
        value: https://docflow-pdf-svc.onrender.com

  # ---- Python PDF engine (also a free web service) ------------------------
  - type: web
    name: docflow-pdf-svc
    runtime: docker
    dockerfilePath: ./pdf-svc/Dockerfile
    dockerContext: ./pdf-svc
    region: singapore
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8000"
